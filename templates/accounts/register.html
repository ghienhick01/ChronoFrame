{% extends 'base.html' %}
{% block title %}Join ChronoFrame{% endblock %}
{% block content %}
<div style="max-width:420px;margin:2rem auto;">
  <div style="text-align:center;margin-bottom:2rem;">
    <div style="font-size:2.5rem;margin-bottom:0.5rem;">🕰️</div>
    <h1 style="font-size:1.8rem;font-weight:800;">Join ChronoFrame</h1>
    <p class="text-muted mt-1">Create your free account</p>
  </div>
  <div class="card"><div class="card-body">
    <form method="post">{% csrf_token %}
      {% for field in form %}<div class="form-group"><label class="form-label">{{ field.label }}</label>{{ field }}{% for e in field.errors %}<div class="form-error">{{ e }}</div>{% endfor %}</div>{% endfor %}
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Create Account</button>
    </form>
  </div>
  <div class="card-footer text-center text-muted" style="font-size:0.875rem;">
    Already a member? <a href="{% url 'accounts:login' %}" style="color:var(--accent);font-weight:600;">Sign in</a>
  </div></div>
</div>
{% endblock %}
