{% extends 'base.html' %}
{% block title %}Delete Album{% endblock %}
{% block content %}
<div style="max-width:440px;margin:2rem auto;text-align:center;">
  <div class="card"><div class="card-body">
    <div style="font-size:3rem;margin-bottom:1rem;">🗑️</div>
    <h2 style="font-size:1.4rem;font-weight:700;margin-bottom:0.5rem;">Delete "{{ object.title }}"?</h2>
    <p class="text-muted">This will permanently delete the album and all its photos.</p>
    <div class="flex gap-1 items-center" style="justify-content:center;margin-top:1.5rem;">
      <form method="post">{% csrf_token %}<button type="submit" class="btn btn-danger">Yes, Delete</button></form>
      <a href="{% url 'albums:album-detail' object.pk %}" class="btn btn-ghost">Cancel</a>
    </div>
  </div></div>
</div>
{% endblock %}
