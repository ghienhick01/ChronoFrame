{% extends 'base.html' %}
{% block title %}{{ action }} Album — ChronoFrame{% endblock %}
{% block content %}
<div style="max-width:540px;margin:0 auto;">
  <div class="page-header" style="margin-bottom:1.5rem;">
    <h1 class="page-title">{{ action }} Album</h1>
    <a href="{% url 'albums:my-albums' %}" class="btn btn-ghost btn-sm">← Back</a>
  </div>
  <div class="card"><div class="card-body">
    <form method="post" enctype="multipart/form-data">{% csrf_token %}
      {% for field in form %}<div class="form-group"><label class="form-label">{{ field.label }}</label>{{ field }}{% for e in field.errors %}<div class="form-error">{{ e }}</div>{% endfor %}</div>{% endfor %}
      <button type="submit" class="btn btn-primary">{{ action }} Album</button>
    </form>
  </div></div>
</div>
{% endblock %}
