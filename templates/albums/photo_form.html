{% extends 'base.html' %}
{% block title %}Edit Photo — ChronoFrame{% endblock %}
{% block content %}
<div style="max-width:500px;margin:0 auto;">
  <div class="page-header" style="margin-bottom:1.5rem;"><h1 class="page-title">Edit Photo</h1></div>
  <div class="card"><div class="card-body">
    <form method="post" enctype="multipart/form-data">{% csrf_token %}
      {% for field in form %}<div class="form-group"><label class="form-label">{{ field.label }}</label>{{ field }}{% for e in field.errors %}<div class="form-error">{{ e }}</div>{% endfor %}</div>{% endfor %}
      <button type="submit" class="btn btn-primary">Save</button>
    </form>
  </div></div>
</div>
{% endblock %}
